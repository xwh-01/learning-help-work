templates:
  observe:
    name: Compare
    goal: 让学习者比较普通写法和目标技术写法，理解目标技术解决了什么问题。
    task_style: 技术理解问答，不要求写完整可执行代码。
    constraints:
      - 问题围绕普通写法如何处理、目标技术如何处理、两者差异在哪里。
      - 必须要求学习者说明目标技术解决的痛点。
      - 可以引用代码片段，但不要要求用户自己写完整代码。
      - rubric 关注是否理解 baseline vs target 的差异。

  hands_on:
    name: Practice
    goal: 让学习者把当前知识点应用到一个小场景设计中。
    task_style: 场景设计问答，不要求网页运行代码。
    constraints:
      - 给一个具体小场景，让用户说明会拆哪些步骤、节点或模块。
      - 要求说明状态或数据如何流转，以及为什么这样设计。
      - 要求说明什么情况下不该使用目标技术。
      - 可以允许伪代码，但不要要求完整可执行代码。
      - rubric 关注是否能把技术合理用到场景里。

  summary:
    name: Reflect
    goal: 让学习者沉淀技术适用边界和个人理解。
    task_style: 总结反思问答。
    constraints:
      - 要求用户用自己的话说明技术解决什么痛点。
      - 要求说明普通方案怎么做、什么时候适合用、什么时候不适合用。
      - 要求给一个最小体感例子。
      - rubric 关注痛点、适用边界、不适用边界是否清楚。
